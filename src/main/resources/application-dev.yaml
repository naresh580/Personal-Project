server:
  port: 8083

#database configurations
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth-app?useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
      pool-name: HikariCP
      maximum-pool-size: 10
      idle-timeout: 60000
      max-lifetime: 100000
      validation-timeout: 100000
      leak-detection-threshold: 0
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      # 'update' automatically creates/modifies tables based on your Java entities
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # Standard dialect for modern MySQL versions (XAMPP often uses MariaDB/MySQL 8+)
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  #to enable spring security logs
logging:
  level:
    org.springframework.security: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:4f9c1c5f7b7e8f4a2f0d9c8b7e6a5d4c3b2a1908f7e6d5c4b3a29180ffeeddccbbaa99887766554433221100aabbccddeeff11223344556677889900}
    issuer: ${JWT_ISSUER:api.substring.com}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}